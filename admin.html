<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoTap 관리자</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<style>
:root{--bg0:#0d1117;--bg1:#161b22;--bg2:#21262d;--bg3:#2d333b;--accent:#2ea043;--accent2:#3fb950;--t1:#e6edf3;--t2:#8b949e;--t3:#484f58;--bdr:rgba(255,255,255,0.08);--amber:#d29922;--amberBg:rgba(210,153,34,0.12);--amberBdr:rgba(210,153,34,0.3);--teal:#39d353;--tealBg:rgba(57,211,83,0.08);--tealBdr:rgba(57,211,83,0.25);--red:#f85149;--blue:#58a6ff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg0);color:var(--t1);font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;min-height:100vh;}

#app{display:flex;height:100vh;overflow:hidden;}

/* 사이드바 */
#sidebar{width:240px;background:var(--bg1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;}
#sidebar-header{padding:20px 16px 16px;border-bottom:1px solid var(--bdr);}
.admin-logo{font-size:18px;font-weight:700;margin-bottom:2px;}
.admin-logo span{color:var(--accent2);}
.admin-sub{font-size:11px;color:var(--t3);}
#country-list{flex:1;overflow-y:auto;padding:8px;}
#country-list::-webkit-scrollbar{width:3px;}
#country-list::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px;}
.country-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:2px;}
.country-item:hover{background:var(--bg2);}
.country-item.active{background:var(--bg3);}
.ci-flag{font-size:16px;flex-shrink:0;}
.ci-name{font-size:12px;flex:1;}
.ci-badge{font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(46,160,67,0.15);color:var(--accent2);border:1px solid rgba(46,160,67,0.2);}
#sidebar-footer{padding:12px 16px;border-top:1px solid var(--bdr);}
.btn-new{width:100%;padding:8px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-new:hover{background:var(--accent2);}

/* 메인 */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{height:48px;background:var(--bg1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;}
#topbar-title{font-size:14px;font-weight:500;flex:1;}
.btn-save{padding:7px 16px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;}
.btn-save:hover{background:var(--accent2);}
.btn-save:disabled{background:var(--bg3);color:var(--t3);cursor:not-allowed;}
.btn-delete{padding:7px 12px;background:rgba(248,81,73,0.1);color:var(--red);border:1px solid rgba(248,81,73,0.2);border-radius:6px;font-size:12px;cursor:pointer;}
.btn-delete:hover{background:rgba(248,81,73,0.2);}

#editor{flex:1;overflow-y:auto;padding:24px;max-width:800px;}
#editor::-webkit-scrollbar{width:4px;}
#editor::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px;}

/* 섹션 */
.section{background:var(--bg1);border:1px solid var(--bdr);border-radius:10px;padding:20px;margin-bottom:16px;}
.section-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title i{color:var(--t2);}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;color:var(--t2);margin-bottom:5px;}
.field input,.field textarea,.field select{width:100%;background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;padding:8px 10px;color:var(--t1);font-size:12px;font-family:inherit;outline:none;transition:border-color 0.15s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);}
.field textarea{resize:vertical;min-height:70px;line-height:1.6;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* 기출(KICE) 섹션 */
.kice-section{background:var(--amberBg);border:1px solid var(--amberBdr);border-radius:10px;padding:20px;margin-bottom:16px;}
.kice-section .section-title{color:var(--amber);}
.kice-section .section-title i{color:var(--amber);}

.kice-item{background:var(--bg1);border:1px solid var(--bdr);border-radius:8px;padding:12px;margin-bottom:8px;position:relative;}
.kice-item-header{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.item-num{font-size:10px;color:var(--t3);flex-shrink:0;min-width:16px;}
.kice-item-header input{flex:1;}
.btn-remove{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;}
.btn-remove:hover{color:var(--red);background:rgba(248,81,73,0.1);}

/* 중요도 선택 */
.imp-group{display:flex;gap:6px;margin-bottom:10px;}
.imp-btn{flex:1;padding:6px 4px;border-radius:6px;border:1px solid var(--bdr);background:var(--bg2);color:var(--t3);font-size:11px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.15s;font-family:inherit;}
.imp-btn:hover{border-color:var(--amber);color:var(--amber);}
.imp-btn.sel-3{background:var(--amberBg);border-color:var(--amber);color:var(--amber);}
.imp-btn.sel-2{background:rgba(88,166,255,0.1);border-color:var(--blue);color:var(--blue);}
.imp-btn.sel-1{background:var(--bg3);border-color:var(--t3);color:var(--t2);}

/* 빈출 토글 */
.bichul-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.bichul-row input[type=checkbox]{width:auto;accent-color:var(--red);}
.bichul-row label{font-size:11px;color:var(--t2);cursor:pointer;}

.tags-hint{font-size:10px;color:var(--t3);margin-top:3px;}

.btn-add{width:100%;padding:8px;background:none;border:1px dashed var(--bdr);border-radius:6px;color:var(--t3);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:4px;}
.btn-add:hover{border-color:var(--amber);color:var(--amber);}

/* EBS 섹션 */
.ebs-section{background:var(--tealBg);border:1px solid var(--tealBdr);border-radius:10px;padding:20px;margin-bottom:16px;}
.ebs-section .section-title{color:var(--teal);}
.ebs-section .section-title i{color:var(--teal);}
.ebs-section .btn-add:hover{border-color:var(--teal);color:var(--teal);}

.ebs-item{background:var(--bg1);border:1px solid var(--bdr);border-radius:8px;padding:12px;margin-bottom:8px;}
.ebs-item-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.ebs-item-header input{flex:1;}

/* 알림 */
#toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:12px 16px;font-size:13px;display:none;align-items:center;gap:8px;z-index:100;}
#toast.show{display:flex;}
#toast.success{border-color:rgba(46,160,67,0.4);color:var(--accent2);}
#toast.error{border-color:rgba(248,81,73,0.4);color:var(--red);}

/* 빈 상태 */
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--t3);}
#empty-state i{font-size:40px;}
#empty-state p{font-size:13px;}

.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="admin-logo"><span>Geo</span>Tap <span style="font-size:11px;color:var(--t3);font-weight:400;">관리자</span></div>
      <div class="admin-sub">국가 데이터 편집</div>
    </div>
    <div id="country-list">
      <div style="font-size:11px;color:var(--t3);padding:6px 10px 4px;">DB 국가 목록</div>
    </div>
    <div id="sidebar-footer">
      <button class="btn-new" onclick="newCountry()">
        <i class="ti ti-plus" style="font-size:14px;"></i> 새 국가 추가
      </button>
    </div>
  </div>

  <div id="main">
    <div id="topbar">
      <span id="topbar-title">국가를 선택하거나 새로 추가하세요</span>
      <button class="btn-delete" id="btn-delete" style="display:none;" onclick="deleteCountry()">
        <i class="ti ti-trash" style="font-size:13px;"></i> 삭제
      </button>
      <button class="btn-save" id="btn-save" onclick="saveCountry()">
        <i class="ti ti-device-floppy" style="font-size:13px;"></i> 저장
      </button>
    </div>

    <div id="editor">
      <div id="empty-state">
        <i class="ti ti-map-pin"></i>
        <p>좌측에서 국가를 선택하거나 새로 추가해주세요</p>
      </div>

      <div id="form" style="display:none;">

        <!-- 기본 정보 -->
        <div class="section">
          <div class="section-title"><i class="ti ti-info-circle"></i> 기본 정보</div>
          <div class="field-row">
            <div class="field">
              <label>국가명 (영문) *</label>
              <input type="text" id="f-name-en" placeholder="예: Brazil">
            </div>
            <div class="field">
              <label>국가명 (한글) *</label>
              <input type="text" id="f-name-kr" placeholder="예: 브라질">
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label>국기 이모지</label>
              <input type="text" id="f-flag" placeholder="예: 🇧🇷">
            </div>
            <div class="field">
              <label>대륙</label>
              <select id="f-region">
                <option value="">선택</option>
                <option value="asia">아시아</option>
                <option value="europe">유럽</option>
                <option value="africa">아프리카</option>
                <option value="namerica">북미</option>
                <option value="samerica">남미</option>
                <option value="oceania">오세아니아</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>한 줄 소개</label>
            <textarea id="f-desc" rows="2" placeholder="예: 남아메리카 최대 국가. 아마존 열대우림과 광대한 브라질 고원이 특징."></textarea>
          </div>
          <div class="field">
            <label>검색 태그 (쉼표로 구분)</label>
            <input type="text" id="f-tags" placeholder="예: 브라질, brazil, 아마존, 열대우림">
          </div>
        </div>

        <!-- 기출 포인트 (KICE) -->
        <div class="kice-section">
          <div class="section-title">
            <i class="ti ti-star"></i> 기출 포인트
            <span style="font-size:10px;font-weight:400;color:rgba(210,153,34,0.7);margin-left:4px;">평가원 기출 (수능 · 6월 · 9월)</span>
          </div>
          <div id="kice-list"></div>
          <button class="btn-add" onclick="addKicePoint()">
            <i class="ti ti-plus" style="font-size:12px;"></i> 기출 포인트 추가
          </button>
        </div>

        <!-- EBS 연계 -->
        <div class="ebs-section">
          <div class="section-title">
            <i class="ti ti-book"></i> EBS 연계
            <span style="font-size:10px;font-weight:400;color:rgba(57,211,83,0.6);margin-left:4px;">수능특강 · 수능완성</span>
          </div>
          <div id="ebs-list"></div>
          <button class="btn-add" onclick="addEbsPoint()" style="border-color:var(--tealBdr);">
            <i class="ti ti-plus" style="font-size:12px;"></i> EBS 내용 추가
          </button>
        </div>

      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL='https://jvkpxuvpjiyueefakkow.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2a3B4dXZwaml5dWVlZmFra293Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMjY0MjAsImV4cCI6MjA5MzkwMjQyMH0.DBhR0RK79LNqMud6dUEWiW3RUzuDGBVLr0Ohd773a9c';
const HEADERS={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

let countries=[],currentId=null,isNew=false;

// ── API ───────────────────────────────────────────
async function api(method,path,body=null){
  const opts={method,headers:HEADERS};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(SUPABASE_URL+path,opts);
  if(!res.ok){const err=await res.text();throw new Error(err);}
  const text=await res.text();
  return text?JSON.parse(text):null;
}

// ── 로드 ─────────────────────────────────────────
async function loadCountries(){
  try{
    countries=await api('GET','/rest/v1/countries?select=*&order=name_kr.asc');
    renderList();
  }catch(e){toast('데이터 로드 실패: '+e.message,'error');}
}

function renderList(){
  const list=document.getElementById('country-list');
  list.innerHTML=`<div style="font-size:11px;color:var(--t3);padding:6px 10px 4px;">DB 국가 목록 (${countries.length}개)</div>`;
  countries.forEach(c=>{
    const el=document.createElement('div');
    el.className='country-item'+(c.id===currentId?' active':'');
    el.innerHTML=`<span class="ci-flag">${c.flag||'🌍'}</span><span class="ci-name">${c.name_kr||c.name_en}</span><span class="ci-badge">완료</span>`;
    el.onclick=()=>selectCountry(c.id);
    list.appendChild(el);
  });
}

// ── 선택 / 새 국가 ────────────────────────────────
function selectCountry(id){
  currentId=id;isNew=false;
  const c=countries.find(x=>x.id===id);
  if(!c)return;
  renderList();showForm(c);
}

function newCountry(){
  currentId=null;isNew=true;
  renderList();showForm(null);
  document.getElementById('topbar-title').textContent='새 국가 추가';
  document.getElementById('btn-delete').style.display='none';
}

function showForm(c){
  document.getElementById('empty-state').style.display='none';
  document.getElementById('form').style.display='block';
  document.getElementById('btn-delete').style.display=isNew?'none':'flex';
  document.getElementById('topbar-title').textContent=c?(c.name_kr||c.name_en||'새 국가'):'새 국가';

  document.getElementById('f-name-en').value=c?.name_en||'';
  document.getElementById('f-name-kr').value=c?.name_kr||'';
  document.getElementById('f-flag').value=c?.flag||'';
  document.getElementById('f-region').value=c?.region||'';
  document.getElementById('f-desc').value=c?.description||'';
  document.getElementById('f-tags').value=c?.search_tags||'';

  const cats=c?.categories||[];
  renderKiceList(cats);
  renderEbsList(cats);
}

// ── KICE 렌더 ─────────────────────────────────────
function renderKiceList(cats){
  const kiceCat=cats.find(c=>c.id==='kice')||{points:[]};
  const list=document.getElementById('kice-list');
  list.innerHTML='';
  (kiceCat.points||[]).forEach((pt,i)=>list.appendChild(makeKiceItem(i,pt)));
}

function makeKiceItem(idx,pt){
  const div=document.createElement('div');
  div.className='kice-item';
  div.id='kice-'+idx;

  const imp=pt.importance||0;
  div.innerHTML=`
    <div class="kice-item-header">
      <span class="item-num">${idx+1}</span>
      <input type="text" placeholder="기출 포인트 설명" value="${esc(pt.text||'')}" data-kf="text" data-idx="${idx}">
      <button class="btn-remove" onclick="removeKice(${idx})"><i class="ti ti-x"></i></button>
    </div>

    <div style="margin-bottom:8px;">
      <div style="font-size:10px;color:var(--t3);margin-bottom:5px;">중요도</div>
      <div class="imp-group" id="imp-group-${idx}">
        <button class="imp-btn ${imp===3?'sel-3':''}" data-imp="3" data-idx="${idx}" onclick="setImp(${idx},3)">⭐⭐⭐ 최상</button>
        <button class="imp-btn ${imp===2?'sel-2':''}" data-imp="2" data-idx="${idx}" onclick="setImp(${idx},2)">⭐⭐ 상</button>
        <button class="imp-btn ${imp===1?'sel-1':''}" data-imp="1" data-idx="${idx}" onclick="setImp(${idx},1)">⭐ 중</button>
      </div>
    </div>

    <div class="field">
      <input type="text" placeholder="기출 태그 (쉼표 구분, 예: 26수능 19번 3점, 25평가원6월 15번 2점)" value="${esc((pt.tags||[]).join(', '))}" data-kf="tags" data-idx="${idx}">
      <div class="tags-hint">형식: 26수능 19번 3점 · 25평가원6월 15번 2점 · 24평가원9월 8번 3점</div>
    </div>

    <div class="bichul-row">
      <input type="checkbox" id="bichul-${idx}" data-kf="bichul" data-idx="${idx}" ${pt.bichul?'checked':''}>
      <label for="bichul-${idx}">빈출 — 여러 해에 걸쳐 반복 출제된 포인트</label>
    </div>
  `;
  return div;
}

function setImp(idx,val){
  const group=document.getElementById('imp-group-'+idx);
  group.querySelectorAll('.imp-btn').forEach(btn=>{
    const bv=parseInt(btn.dataset.imp);
    btn.className='imp-btn'+(val===bv?` sel-${bv}`:'');
  });
}

function addKicePoint(){
  const list=document.getElementById('kice-list');
  const idx=list.children.length;
  list.appendChild(makeKiceItem(idx,{text:'',tags:[],bichul:false,importance:0}));
  list.lastElementChild.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function removeKice(idx){
  document.getElementById('kice-'+idx)?.remove();
  reindexKice();
}

function reindexKice(){
  const list=document.getElementById('kice-list');
  Array.from(list.children).forEach((el,i)=>{
    el.id='kice-'+i;
    el.querySelector('.item-num').textContent=i+1;
    el.querySelectorAll('[data-idx]').forEach(inp=>inp.dataset.idx=i);
    el.querySelector('.btn-remove').setAttribute('onclick',`removeKice(${i})`);
    // imp-group id 갱신
    const ig=el.querySelector('[id^=imp-group-]');
    if(ig)ig.id='imp-group-'+i;
    el.querySelectorAll('.imp-btn').forEach(btn=>{
      btn.setAttribute('onclick',`setImp(${i},${btn.dataset.imp})`);
      btn.dataset.idx=i;
    });
    const cb=el.querySelector('[type=checkbox]');
    if(cb){cb.id='bichul-'+i;el.querySelector('label[for^=bichul]').setAttribute('for','bichul-'+i);}
  });
}

// ── EBS 렌더 ─────────────────────────────────────
function renderEbsList(cats){
  const ebsCat=cats.find(c=>c.id==='ebs')||{points:[]};
  const list=document.getElementById('ebs-list');
  list.innerHTML='';
  (ebsCat.points||[]).forEach((pt,i)=>list.appendChild(makeEbsItem(i,pt)));
}

function makeEbsItem(idx,pt){
  const div=document.createElement('div');
  div.className='ebs-item';
  div.id='ebs-'+idx;
  div.innerHTML=`
    <div class="ebs-item-header">
      <span class="item-num">${idx+1}</span>
      <input type="text" placeholder="제목 (예: 아마존 개발 문제)" value="${esc(pt.title||'')}" data-ef="title" data-idx="${idx}" style="flex:1;">
      <button class="btn-remove" onclick="removeEbs(${idx})"><i class="ti ti-x"></i></button>
    </div>
    <div class="field">
      <textarea placeholder="내용 설명" rows="3" data-ef="text" data-idx="${idx}">${esc(pt.text||'')}</textarea>
    </div>
    <div class="field">
      <input type="text" placeholder="출처 (예: 수능특강 p.42, 수능완성 Theme 7)" value="${esc(pt.source||'')}" data-ef="source" data-idx="${idx}">
    </div>
  `;
  return div;
}

function addEbsPoint(){
  const list=document.getElementById('ebs-list');
  const idx=list.children.length;
  list.appendChild(makeEbsItem(idx,{title:'',text:'',source:''}));
  list.lastElementChild.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function removeEbs(idx){
  document.getElementById('ebs-'+idx)?.remove();
  reindexEbs();
}

function reindexEbs(){
  const list=document.getElementById('ebs-list');
  Array.from(list.children).forEach((el,i)=>{
    el.id='ebs-'+i;
    el.querySelector('.item-num').textContent=i+1;
    el.querySelectorAll('[data-idx]').forEach(inp=>inp.dataset.idx=i);
    el.querySelector('.btn-remove').setAttribute('onclick',`removeEbs(${i})`);
  });
}

// ── 데이터 수집 ───────────────────────────────────
function collectData(){
  const cats=[];

  // KICE
  const kiceList=document.getElementById('kice-list');
  const kicePoints=[];
  Array.from(kiceList.children).forEach(item=>{
    const text=item.querySelector('[data-kf="text"]')?.value?.trim()||'';
    if(!text)return;
    const tagsStr=item.querySelector('[data-kf="tags"]')?.value?.trim()||'';
    const bichul=item.querySelector('[data-kf="bichul"]')?.checked||false;
    const tags=tagsStr?tagsStr.split(',').map(t=>t.trim()).filter(Boolean):[];
    // 중요도: 선택된 imp-btn에서 추출
    const selImp=item.querySelector('.imp-btn.sel-3,.imp-btn.sel-2,.imp-btn.sel-1');
    const importance=selImp?parseInt(selImp.dataset.imp):0;
    kicePoints.push({text,tags,bichul,importance});
  });
  if(kicePoints.length>0) cats.push({id:'kice',ic:'ti-star',t:'기출 포인트',isExam:true,points:kicePoints});

  // EBS
  const ebsList=document.getElementById('ebs-list');
  const ebsPoints=[];
  Array.from(ebsList.children).forEach(item=>{
    const title=item.querySelector('[data-ef="title"]')?.value?.trim()||'';
    const text=item.querySelector('[data-ef="text"]')?.value?.trim()||'';
    if(!text)return;
    const source=item.querySelector('[data-ef="source"]')?.value?.trim()||'';
    ebsPoints.push({title,text,source});
  });
  if(ebsPoints.length>0) cats.push({id:'ebs',ic:'ti-book',t:'EBS 연계',points:ebsPoints});

  return{
    name_en:document.getElementById('f-name-en').value.trim(),
    name_kr:document.getElementById('f-name-kr').value.trim(),
    flag:document.getElementById('f-flag').value.trim(),
    region:document.getElementById('f-region').value,
    description:document.getElementById('f-desc').value.trim(),
    search_tags:document.getElementById('f-tags').value.trim(),
    categories:cats
  };
}

// ── 저장 / 삭제 ───────────────────────────────────
async function saveCountry(){
  const data=collectData();
  if(!data.name_en){toast('영문 국가명을 입력해주세요','error');return;}
  if(!data.name_kr){toast('한글 국가명을 입력해주세요','error');return;}
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div> 저장 중...';
  try{
    if(isNew){
      const result=await api('POST','/rest/v1/countries',data);
      if(result&&result[0])currentId=result[0].id;
      isNew=false;
      toast('새 국가가 추가됐어요! 🎉','success');
    }else{
      await api('PATCH',`/rest/v1/countries?id=eq.${currentId}`,data);
      toast('저장 완료! ✅','success');
    }
    await loadCountries();
    document.getElementById('btn-delete').style.display='flex';
    document.getElementById('topbar-title').textContent=data.name_kr;
  }catch(e){
    toast('저장 실패: '+e.message,'error');
  }finally{
    btn.disabled=false;
    btn.innerHTML='<i class="ti ti-device-floppy" style="font-size:13px;"></i> 저장';
  }
}

async function deleteCountry(){
  if(!currentId)return;
  const c=countries.find(x=>x.id===currentId);
  if(!confirm(`"${c?.name_kr||c?.name_en}" 을 삭제할까요? 되돌릴 수 없어요.`))return;
  try{
    await api('DELETE',`/rest/v1/countries?id=eq.${currentId}`);
    currentId=null;
    document.getElementById('empty-state').style.display='flex';
    document.getElementById('form').style.display='none';
    document.getElementById('topbar-title').textContent='국가를 선택하거나 새로 추가하세요';
    toast('삭제됐어요','success');
    await loadCountries();
  }catch(e){
    toast('삭제 실패: '+e.message,'error');
  }
}

// ── 유틸 ─────────────────────────────────────────
function esc(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function toast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`show ${type}`;
  setTimeout(()=>el.className='',3000);
}

loadCountries();
</script>
