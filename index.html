<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoTap — 수능 세계지리 학습 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<style>
:root{--bg0:#0d1117;--bg1:#161b22;--bg2:#21262d;--bg3:#2d333b;--accent:#2ea043;--accent2:#3fb950;--t1:#e6edf3;--t2:#8b949e;--t3:#484f58;--bdr:rgba(255,255,255,0.08);--amber:#d29922;--amberBg:rgba(210,153,34,0.12);--amberBdr:rgba(210,153,34,0.25);--blue:#58a6ff;--blueBg:rgba(88,166,255,0.1);--red:#f85149;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;}
#gt{background:var(--bg0);border-radius:12px;color:var(--t1);height:680px;width:100%;max-width:1200px;display:flex;overflow:hidden;}
#nav{width:52px;background:var(--bg1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:6px;flex-shrink:0;z-index:10;}
.nlogo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;margin-bottom:10px;line-height:1.2;text-align:center;}
.nbtn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:18px;border:none;background:none;position:relative;}
.nbtn:hover,.nbtn.on{background:var(--bg3);color:var(--t1);}
.nbtn.on{color:var(--accent2);}
.nbtn-label{position:absolute;left:46px;background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--t1);white-space:nowrap;display:none;z-index:100;}
.nbtn:hover .nbtn-label{display:block;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
#topbar{height:44px;background:var(--bg1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:5;}
#tb-title{font-size:13px;font-weight:500;}
#tb-sep{color:var(--t3);}
#tb-sub{font-size:12px;color:var(--t2);}
#sbox{margin-left:auto;background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;display:flex;align-items:center;padding:0 10px;gap:6px;height:28px;}
#sbox input{background:none;border:none;outline:none;color:var(--t1);font-size:12px;width:200px;}
#sbox input::placeholder{color:var(--t3);}
#map-view{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#conflict-view{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--t3);}
#map-area{flex:1;position:relative;overflow:hidden;}
#toolbar{position:absolute;top:12px;left:12px;display:flex;gap:5px;z-index:4;flex-wrap:wrap;max-width:600px;}
.rpill{font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid var(--bdr);background:rgba(13,17,23,0.88);color:var(--t2);cursor:pointer;white-space:nowrap;}
.rpill.on,.rpill:hover{background:var(--bg3);color:var(--t1);border-color:var(--accent);}
#reset-btn{position:absolute;top:12px;right:12px;background:rgba(13,17,23,0.88);border:1px solid var(--bdr);border-radius:6px;color:var(--t2);font-size:11px;padding:5px 10px;cursor:pointer;z-index:4;display:none;align-items:center;gap:5px;}
#reset-btn:hover{background:var(--bg3);color:var(--t1);}
#world-svg{width:100%;height:100%;background:#0a1628;cursor:grab;}
#world-svg:active{cursor:grabbing;}
.cp{fill:#1a3a5c;stroke:#0a1628;stroke-width:0.5;cursor:pointer;transition:fill 0.15s;}
.cp:hover{fill:#2a4a6c;}
.cp.sel{fill:#3fb950;stroke:#2ea043;stroke-width:1;}
.cp.hd{fill:#1d4a2a;}
.cp.hd:hover{fill:#2a6a3a;}
#zoom-controls{position:absolute;bottom:50px;left:12px;display:flex;flex-direction:column;gap:4px;z-index:4;}
.zbtn{width:28px;height:28px;background:rgba(13,17,23,0.9);border:1px solid var(--bdr);border-radius:6px;color:var(--t2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.zbtn:hover{background:var(--bg3);color:var(--t1);}
#legend{position:absolute;bottom:12px;left:12px;background:rgba(13,17,23,0.9);border:1px solid var(--bdr);border-radius:6px;padding:6px 12px;font-size:11px;color:var(--t2);display:flex;align-items:center;gap:10px;z-index:4;}
.ldot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
#panel{position:absolute;top:0;right:0;width:320px;height:100%;background:var(--bg1);border-left:1px solid var(--bdr);display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.35s cubic-bezier(.4,0,.2,1);z-index:6;}
#panel.open{transform:translateX(0);}
#ph{padding:14px 14px 12px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
#ph-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
#ph-left{display:flex;align-items:center;gap:10px;}
#c-flag{font-size:26px;line-height:1;}
#c-name{font-size:16px;font-weight:500;line-height:1.2;}
#c-en{font-size:11px;color:var(--t2);margin-top:2px;}
#close-btn{width:28px;height:28px;border-radius:6px;background:none;border:1px solid var(--bdr);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
#close-btn:hover{background:var(--bg3);}
#c-desc{font-size:12px;color:var(--t2);line-height:1.65;}
#cats{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:5px;min-height:0;}
#cats::-webkit-scrollbar{width:3px;}
#cats::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px;}
.cc{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;overflow:hidden;flex-shrink:0;}
.ch{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;user-select:none;}
.ch:hover{background:var(--bg3);}
.ci{font-size:14px;color:var(--t2);width:16px;text-align:center;}
.ct{font-size:12px;font-weight:500;flex:1;}
.cv{font-size:11px;color:var(--t3);transition:transform 0.2s;}
.ch.open .cv{transform:rotate(180deg);}
.cb{display:none;padding:10px 12px 12px;border-top:1px solid var(--bdr);}
.cb.open{display:block;}
.kw-wrap{display:flex;flex-wrap:wrap;gap:5px;}
.kw-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;border:1px solid var(--bdr);background:var(--bg3);color:var(--t1);font-size:11px;cursor:pointer;transition:all 0.15s;}
.kw-tag:hover{border-color:var(--accent);color:var(--accent2);}
.kw-tag.active{border-color:var(--accent);background:rgba(46,160,67,0.12);color:var(--accent2);}
.kw-tag.has-loc{border-color:rgba(88,166,255,0.25);}
.kw-tag.has-loc:hover,.kw-tag.has-loc.active{border-color:var(--blue);color:var(--blue);background:var(--blueBg);}
.kw-desc{margin-top:8px;padding:8px 10px;background:var(--bg0);border-radius:6px;border:1px solid var(--bdr);font-size:12px;color:var(--t2);line-height:1.7;display:none;}
.kw-desc.open{display:block;}
.loc-hint{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--blue);margin-top:5px;}
.exam-card{background:var(--amberBg);border:1px solid var(--amberBdr);border-radius:8px;overflow:hidden;flex-shrink:0;}
.exam-card .ch:hover{background:rgba(210,153,34,0.08);}
.exam-body{display:none;padding:10px 12px 12px;border-top:1px solid var(--amberBdr);}
.exam-body.open{display:flex;flex-direction:column;gap:8px;}
.exam-item{background:var(--bg1);border:1px solid var(--bdr);border-radius:6px;padding:8px 10px;}
.exam-item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
.exam-item-text{font-size:12px;color:var(--t1);line-height:1.6;flex:1;}
.exam-tags{display:flex;flex-wrap:wrap;gap:4px;}
.exam-year-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--blueBg);border:1px solid rgba(88,166,255,0.2);color:var(--blue);}
.bichul-badge{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(248,81,73,0.12);border:1px solid rgba(248,81,73,0.25);color:var(--red);font-weight:500;white-space:nowrap;}
.continent-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:12px;flex-shrink:0;}
.continent-title{font-size:13px;font-weight:500;margin-bottom:8px;color:var(--t1);}
.continent-issues{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:12px;}
.top5-label{font-size:11px;color:var(--t3);margin-bottom:6px;font-weight:500;}
.top5-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--bdr);background:var(--bg1);margin-bottom:5px;}
.top5-item:hover{background:var(--bg3);border-color:var(--accent);}
.top5-rank{font-size:11px;color:var(--t3);width:16px;text-align:center;flex-shrink:0;}
.top5-flag{font-size:16px;}
.top5-name{font-size:12px;flex:1;}
.top5-count{font-size:11px;color:var(--amber);}
#bbar{height:36px;background:var(--bg1);border-top:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;gap:16px;flex-shrink:0;font-size:11px;color:var(--t3);z-index:5;}
.bs{display:flex;align-items:center;gap:4px;}
.bv{color:var(--t2);font-weight:500;}
.bv.g{color:var(--accent2);}
</style>
</head>
<body>
<div id="gt">
  <div id="nav">
    <div class="nlogo">Geo<br>Tap</div>

            <div id="c-desc"></div>

          <div id="cats"></div>
        </div>
      </div>
    </div>
    <div id="conflict-view">
      <i class="ti ti-sword" style="font-size:48px;color:var(--t3);"></i>
      <div style="font-size:16px;font-weight:500;color:var(--t2);">분쟁지도</div>
      <div style="font-size:13px;color:var(--t3);text-align:center;line-height:1.7;">전 세계 분쟁을 한눈에 볼 수 있는<br>분쟁지도를 준비 중이에요.<br>빠르게 업데이트할게요!</div>
    </div>
    <div id="bbar">
      <span class="bs"><i class="ti ti-world" style="font-size:12px;"></i>&nbsp;전체 <span class="bv">195개국</span></span>
      <span class="bs">데이터 보유 <span class="bv g" id="data-count">로딩 중...</span></span>
      <span class="bs" style="margin-left:auto;">수능 세계지리 · 평가원 기출 기반</span>

</div>

<script>
function switchView(v){
  document.getElementById('map-view').style.display=v==='map'?'flex':'none';
  document.getElementById('conflict-view').style.display=v==='conflict'?'flex':'none';
  document.getElementById('nav-map').classList.toggle('on',v==='map');
  document.getElementById('nav-conflict').classList.toggle('on',v==='conflict');
  document.getElementById('tb-sub').textContent=v==='map'?'세계 지도 탐색':'분쟁지도';
}

const CONTINENTS={
  asia:{name:"아시아",issues:"중동의 종교·자원 분쟁, 동남아시아 해양 영토 갈등, 카슈미르 분쟁 등 다양한 갈등이 공존. 인구 과밀과 급속한 도시화, 물 부족 문제도 핵심 이슈.",top5:[{flag:"🇸🇦",kr:"사우디아라비아",en:"Saudi Arabia",count:"47회"},{flag:"🇮🇳",kr:"인도",en:"India",count:"38회"},{flag:"🇨🇳",kr:"중국",en:"China",count:"35회"},{flag:"🇯🇵",kr:"일본",en:"Japan",count:"29회"},{flag:"🇮🇷",kr:"이란",en:"Iran",count:"21회"}]},

  samerica:{name:"남미",issues:"아마존 열대우림 파괴와 탄소 배출, 자원 수출 의존형 경제 구조, 빈부격차와 도시 슬럼화, 마약 카르텔 문제.",top5:[{flag:"🇧🇷",kr:"브라질",en:"Brazil",count:"52회"},{flag:"🇦🇷",kr:"아르헨티나",en:"Argentina",count:"28회"},{flag:"🇨🇱",kr:"칠레",en:"Chile",count:"22회"},{flag:"🇵🇪",kr:"페루",en:"Peru",count:"17회"},{flag:"🇨🇴",kr:"콜롬비아",en:"Colombia",count:"14회"}]},

const SUPABASE_URL = 'https://jvkpxuvpjiyueefakkow.supabase.co';

async function fetchCountries() {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/countries?select=*', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    if (!res.ok) return [];
    return await res.json();
  } catch(e) { return []; }
}

function parseCountry(row) {
  return {
    flag: row.flag || '🌍',
    kr: row.name_kr || row.name_en,
    en: row.name_en,
    region: row.region || '',
    desc: row.description || '',
    searchTags: row.search_tags ? row.search_tags.split(',').map(t => t.trim().toLowerCase()) : [row.name_en.toLowerCase()],
    cats: row.categories || []
  };
}

function drawMarker(g,sx,sy,type,label){
  const col=MARKER_COLORS[type]||"#58a6ff";
  if(type==="landform"){
    g.append("polygon").attr("points",`${sx},${sy-11} ${sx-8},${sy+6} ${sx+8},${sy+6}`).attr("fill",col).attr("stroke","#0d1117").attr("stroke-width",1.5);
  } else if(type==="resource"){
    g.append("circle").attr("cx",sx).attr("cy",sy).attr("r",8).attr("fill",col).attr("stroke","#0d1117").attr("stroke-width",1.5);
  } else if(type==="conflict"){
    g.append("circle").attr("cx",sx).attr("cy",sy).attr("r",10).attr("fill","none").attr("stroke",col).attr("stroke-width",2);
    g.append("text").attr("x",sx).attr("y",sy+6).attr("text-anchor","middle").attr("font-size","14px").attr("fill",col).attr("font-weight","bold").text("!");
  } else {
    g.append("circle").attr("cx",sx).attr("cy",sy).attr("r",6).attr("fill",col).attr("stroke","#0d1117").attr("stroke-width",1.5);
  }
  g.append("text").attr("x",sx+14).attr("y",sy+4).attr("fill","#e6edf3").style("font-size","11px").style("font-family","Apple SD Gothic Neo,sans-serif").attr("paint-order","stroke").attr("stroke","#0d1117").attr("stroke-width","3px").text(label);
}

function clearMarkers(){markerG.selectAll("*").remove();activeMarkers=[];}

function addMarker(lat,lon,label,type,transform){
  const p=proj([lon,lat]);if(!p)return;
  const k=transform?transform.k:1,tx=transform?transform.x:0,ty=transform?transform.y:0;
  const sx=p[0]*k+tx,sy=p[1]*k+ty;
  const g=markerG.append("g").attr("class","map-marker");
  drawMarker(g,sx,sy,type,label);
  activeMarkers.push({lat,lon,label,type});
}

function redrawMarkers(){
  const t=d3.zoomTransform(svgEl.node());
  markerG.selectAll("*").remove();
  activeMarkers.forEach(m=>{
    const p=proj([m.lon,m.lat]);if(!p)return;
    const sx=p[0]*t.k+t.x,sy=p[1]*t.k+t.y;
    const g=markerG.append("g").attr("class","map-marker");
    drawMarker(g,sx,sy,m.type,m.label);
  });
}

function renderContinent(region){
  const c=CONTINENTS[region];if(!c)return;
  document.getElementById("c-flag").textContent="🗺️";
  document.getElementById("c-name").textContent=c.name;
  document.getElementById("c-en").textContent="대륙 개요";
  document.getElementById("c-desc").textContent="";
  const cats=document.getElementById("cats");
  cats.innerHTML="";
  const card=document.createElement("div");
  card.className="continent-card";
  card.innerHTML=`<div class="continent-title">주요 이슈</div><div class="continent-issues">${c.issues}</div><div class="top5-label">기출 빈도 Top 5</div>`;
  c.top5.forEach((item,i)=>{
    const el=document.createElement("div");
    el.className="top5-item";
    el.innerHTML=`<span class="top5-rank">${i+1}</span><span class="top5-flag">${item.flag}</span><span class="top5-name">${item.kr}</span><span class="top5-count">${item.count}</span>`;
    el.addEventListener("click",()=>{
      const match=Object.keys(DB).find(k=>DB[k].kr===item.kr||DB[k].en===item.en);
      if(match){
        gEl.selectAll(".cp").each(function(d){
          const id=String(d.id).padStart(3,"0");
          if(IDS[id]===match){if(selEl)d3.select(selEl).classed("sel",false);selEl=this;d3.select(this).classed("sel",true);zoomToFeature(d);}
        });
        renderPanel(match);
      }
    });
    card.appendChild(el);
  });
  cats.appendChild(card);
  document.getElementById("panel").classList.add("open");
}

function renderPanel(name){
  const d=DB[name];
  document.getElementById("c-flag").textContent=d?d.flag:"🌍";
  document.getElementById("c-name").textContent=d?d.kr:name;
  document.getElementById("c-en").textContent=d?d.en:"";
  document.getElementById("c-desc").textContent=d?d.desc:"";
  const cats=document.getElementById("cats");
  cats.innerHTML="";
  clearMarkers();
  if(!d){
    cats.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--t3);font-size:13px;text-align:center;"><i class="ti ti-clock" style="font-size:28px;"></i><span>아직 준비 중이에요.<br>곧 업데이트할게요!</span></div>`;
    return;
  }
  d.cats.forEach(cat=>{
    if(cat.isExam){
      const card=document.createElement("div");card.className="exam-card";
      const head=document.createElement("div");head.className="ch";
      head.innerHTML=`<i class="ti ${cat.ic} ci" style="color:#e3b341;"></i><span class="ct" style="color:#e3b341;">${cat.t}</span><i class="ti ti-chevron-down cv"></i>`;
      const body=document.createElement("div");body.className="exam-body";
      cat.points.forEach(pt=>{
        const item=document.createElement("div");item.className="exam-item";
        const tagsHtml=pt.tags.map(t=>`<span class="exam-year-tag">${t}</span>`).join("");
        const bichul=pt.bichul?`<span class="bichul-badge">빈출</span>`:"";
        item.innerHTML=`<div class="exam-item-top"><span class="exam-item-text">${pt.text}</span>${bichul}</div><div class="exam-tags">${tagsHtml}</div>`;
        body.appendChild(item);
      });
      head.addEventListener("click",()=>{head.classList.toggle("open");body.classList.toggle("open");});
      card.appendChild(head);card.appendChild(body);cats.appendChild(card);
    } else {
      if(!cat.keywords||cat.keywords.length===0)return;
      const card=document.createElement("div");card.className="cc";
      const head=document.createElement("div");head.className="ch";
      head.innerHTML=`<i class="ti ${cat.ic} ci"></i><span class="ct">${cat.t}</span><i class="ti ti-chevron-down cv"></i>`;
      const body=document.createElement("div");body.className="cb";
      const kwWrap=document.createElement("div");kwWrap.className="kw-wrap";
      let activeTag=null,activeDesc=null;
      cat.keywords.forEach(kw=>{
        const tag=document.createElement("span");
        tag.className="kw-tag"+(kw.loc?" has-loc":"");
        tag.innerHTML=kw.loc?`<i class="ti ti-map-pin" style="font-size:10px;"></i>${kw.k}`:kw.k;
        const desc=document.createElement("div");desc.className="kw-desc";
        desc.innerHTML=kw.d+(kw.loc?`<div class="loc-hint"><i class="ti ti-map-pin" style="font-size:10px;"></i>지도에 위치 표시됨</div>`:"");
        kwWrap.appendChild(tag);kwWrap.appendChild(desc);
        tag.addEventListener("click",e=>{
          e.stopPropagation();
          const isActive=activeTag===tag;
          if(activeTag){activeTag.classList.remove("active");activeDesc.classList.remove("open");}
          clearMarkers();
          if(!isActive){
            tag.classList.add("active");desc.classList.add("open");activeTag=tag;activeDesc=desc;
            if(kw.loc){const t=d3.zoomTransform(svgEl.node());addMarker(kw.loc[0],kw.loc[1],kw.k,cat.type||"city",t);}
          } else {activeTag=null;activeDesc=null;}
        });
      });
      body.appendChild(kwWrap);
      head.addEventListener("click",()=>{
        head.classList.toggle("open");body.classList.toggle("open");
        if(!head.classList.contains("open")){clearMarkers();if(activeTag){activeTag.classList.remove("active");activeDesc.classList.remove("open");activeTag=null;activeDesc=null;}}
      });
      card.appendChild(head);card.appendChild(body);cats.appendChild(card);
    }
  });
  document.getElementById("panel").classList.add("open");
}

function zoomToFeature(feature){
  const mapArea=document.getElementById("map-area");
  const W=mapArea.clientWidth,H=mapArea.clientHeight;
  const panelOpen=document.getElementById("panel").classList.contains("open");
  const effectiveW=panelOpen?W-320:W;
  const bounds=pathFn.bounds(feature);
  const bW=bounds[1][0]-bounds[0][0],bH=bounds[1][1]-bounds[0][1];
  const bCX=(bounds[0][0]+bounds[1][0])/2,bCY=(bounds[0][1]+bounds[1][1])/2;
  const scale=Math.min(8,0.82/Math.max(bW/effectiveW,bH/H));
  const tx=effectiveW/2-scale*bCX,ty=H/2-scale*bCY;
  svgEl.transition().duration(750).call(zoomBehavior.transform,d3.zoomIdentity.translate(tx,ty).scale(scale));
}

function zoomToRegion(region){
  const r=REGION_BOUNDS[region];if(!r)return;
  const mapArea=document.getElementById("map-area");
  const W=mapArea.clientWidth,H=mapArea.clientHeight;
  const center=proj([r.center[0],r.center[1]]);
  const scale=r.scale/153;
  const tx=W/2-scale*center[0],ty=H/2-scale*center[1];
  svgEl.transition().duration(750).call(zoomBehavior.transform,d3.zoomIdentity.translate(tx,ty).scale(scale));
}

function resetZoom(){
  svgEl.transition().duration(600).call(zoomBehavior.transform,d3.zoomIdentity);
  document.getElementById("reset-btn").style.display="none";
  document.getElementById("panel").classList.remove("open");
  if(selEl){d3.select(selEl).classed("sel",false);selEl=null;}
  clearMarkers();
}

document.getElementById("close-btn").addEventListener("click",resetZoom);
document.getElementById("reset-btn").addEventListener("click",resetZoom);

document.querySelectorAll(".rpill").forEach(btn=>{
  btn.addEventListener("click",function(){
    document.querySelectorAll(".rpill").forEach(b=>b.classList.remove("on"));
    this.classList.add("on");
    const region=this.dataset.region;
    if(region==="all"){resetZoom();}
    else{
      document.getElementById("reset-btn").style.display="flex";
      zoomToRegion(region);
      renderContinent(region);
    }
  });
});

document.getElementById("sinput").addEventListener("input",function(){
  const q=this.value.trim().toLowerCase();if(!q)return;
  const match=Object.keys(DB).find(k=>DB[k].searchTags.some(tag=>tag.includes(q)));
  if(match){
    if(selEl)d3.select(selEl).classed("sel",false);
    gEl.selectAll(".cp").each(function(d){
      const id=String(d.id).padStart(3,"0");
      if(IDS[id]===match){selEl=this;d3.select(this).classed("sel",true);zoomToFeature(d);}
    });
    renderPanel(match);
    document.getElementById("reset-btn").style.display="flex";
  }
});

async function init(){
  // Supabase에서 데이터 로드
  const rows = await fetchCountries();
  if(rows.length > 0){
    DB = {};
    rows.forEach(row => { DB[row.name_en] = parseCountry(row); });
    buildIDS();
    document.getElementById('data-count').textContent = Object.keys(DB).length + '개국';
  } else {
    // fallback: 기존 샘플 데이터 사용
    DB = FALLBACK_DB;
    buildIDS();
  }

  const world = await d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json");
  {
  svgEl=d3.select("#world-svg");
  gEl=d3.select("#map-g");
  markerG=d3.select("#marker-g");
  proj=d3.geoNaturalEarth1().scale(153).translate([480,265]);
  pathFn=d3.geoPath().projection(proj);
  const feats=topojson.feature(world,world.objects.countries).features;
  zoomBehavior=d3.zoom().scaleExtent([1,12]).on("zoom",e=>{
    gEl.attr("transform",e.transform);
    gEl.selectAll(".cp").attr("stroke-width",0.5/e.transform.k);
    redrawMarkers();
  });
  svgEl.call(zoomBehavior);
  document.getElementById("zi").addEventListener("click",()=>svgEl.transition().duration(300).call(zoomBehavior.scaleBy,1.5));
  document.getElementById("zo").addEventListener("click",()=>svgEl.transition().duration(300).call(zoomBehavior.scaleBy,0.67));
  gEl.selectAll("path").data(feats).join("path")
    .attr("class",d=>"cp"+(IDS[String(d.id).padStart(3,"0")]?" hd":""))
    .attr("d",pathFn)
    .on("click",function(e,d){
      e.stopPropagation();
      if(selEl)d3.select(selEl).classed("sel",false);
      selEl=this;d3.select(this).classed("sel",true);
      document.querySelectorAll(".rpill").forEach(b=>b.classList.remove("on"));
      document.querySelector(".rpill[data-region='all']").classList.add("on");
      const name=IDS[String(d.id).padStart(3,"0")]||null;
      renderPanel(name||null);
      document.getElementById("reset-btn").style.display="flex";
      setTimeout(()=>zoomToFeature(d),50);
    });
  svgEl.on("click",()=>resetZoom());
});
</script>
