<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoTap — 수능 세계지리 학습 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<style>
:root{
  --bg0:#0d1117;--bg1:#161b22;--bg2:#21262d;--bg3:#2d333b;
  --accent:#2ea043;--accent2:#3fb950;
  --t1:#e6edf3;--t2:#8b949e;--t3:#484f58;
  --bdr:rgba(255,255,255,0.08);
  --amber:#d29922;--amberBg:rgba(210,153,34,0.12);--amberBdr:rgba(210,153,34,0.25);
  --blue:#58a6ff;--blueBg:rgba(88,166,255,0.1);--blueBdr:rgba(88,166,255,0.25);
  --red:#f85149;--redBg:rgba(248,81,73,0.1);
  --teal:#39d353;--tealBg:rgba(57,211,83,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;}
#gt{background:var(--bg0);border-radius:12px;color:var(--t1);height:680px;width:100%;max-width:1200px;display:flex;overflow:hidden;}

/* 좌측 nav */
#nav{width:52px;background:var(--bg1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:6px;flex-shrink:0;z-index:10;}
.nlogo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;margin-bottom:10px;line-height:1.2;text-align:center;}
.nbtn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:18px;border:none;background:none;position:relative;}
.nbtn:hover,.nbtn.on{background:var(--bg3);color:var(--t1);}
.nbtn.on{color:var(--accent2);}
.nbtn-label{position:absolute;left:46px;background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--t1);white-space:nowrap;display:none;z-index:100;}
.nbtn:hover .nbtn-label{display:block;}

/* 메인 */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
#topbar{height:44px;background:var(--bg1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:5;}
#tb-title{font-size:13px;font-weight:500;}
#tb-sep{color:var(--t3);}
#tb-sub{font-size:12px;color:var(--t2);}
#sbox{margin-left:auto;background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;display:flex;align-items:center;padding:0 10px;gap:6px;height:28px;}
#sbox input{background:none;border:none;outline:none;color:var(--t1);font-size:12px;width:200px;}
#sbox input::placeholder{color:var(--t3);}

/* 지도 뷰 */
#map-view{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#conflict-view{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--t3);}
#map-area{flex:1;position:relative;overflow:hidden;}
#toolbar{position:absolute;top:12px;left:12px;display:flex;gap:5px;z-index:4;flex-wrap:wrap;max-width:600px;}
.rpill{font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid var(--bdr);background:rgba(13,17,23,0.88);color:var(--t2);cursor:pointer;white-space:nowrap;}
.rpill.on,.rpill:hover{background:var(--bg3);color:var(--t1);border-color:var(--accent);}
#reset-btn{position:absolute;top:12px;right:12px;background:rgba(13,17,23,0.88);border:1px solid var(--bdr);border-radius:6px;color:var(--t2);font-size:11px;padding:5px 10px;cursor:pointer;z-index:4;display:none;align-items:center;gap:5px;}
#reset-btn:hover{background:var(--bg3);color:var(--t1);}
#world-svg{width:100%;height:100%;background:#0a1628;cursor:grab;}
#world-svg:active{cursor:grabbing;}
.cp{fill:#1a3a5c;stroke:#0a1628;stroke-width:0.5;cursor:pointer;transition:fill 0.15s;}
.cp:hover{fill:#2a4a6c;}
.cp.sel{fill:#3fb950;stroke:#2ea043;stroke-width:1;}
.cp.hd{fill:#1d4a2a;}
.cp.hd:hover{fill:#2a6a3a;}
#zoom-controls{position:absolute;bottom:50px;left:12px;display:flex;flex-direction:column;gap:4px;z-index:4;}
.zbtn{width:28px;height:28px;background:rgba(13,17,23,0.9);border:1px solid var(--bdr);border-radius:6px;color:var(--t2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.zbtn:hover{background:var(--bg3);color:var(--t1);}
#legend{position:absolute;bottom:12px;left:12px;background:rgba(13,17,23,0.9);border:1px solid var(--bdr);border-radius:6px;padding:6px 12px;font-size:11px;color:var(--t2);display:flex;align-items:center;gap:10px;z-index:4;}
.ldot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}

/* 사이드 패널 */
#panel{position:absolute;top:0;right:0;width:320px;height:100%;background:var(--bg1);border-left:1px solid var(--bdr);display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.35s cubic-bezier(.4,0,.2,1);z-index:6;}
#panel.open{transform:translateX(0);}
#ph{padding:14px 14px 12px;border-bottom:1px solid var(--bdr);flex-shrink:0;}
#ph-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
#ph-left{display:flex;align-items:center;gap:10px;}
#c-flag{font-size:26px;line-height:1;}
#c-name{font-size:16px;font-weight:500;line-height:1.2;}
#c-en{font-size:11px;color:var(--t2);margin-top:2px;}
#ph-actions{display:flex;align-items:center;gap:6px;}
#close-btn{width:28px;height:28px;border-radius:6px;background:none;border:1px solid var(--bdr);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
#close-btn:hover{background:var(--bg3);}

/* 챗봇 버튼 */
#chat-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;height:28px;border-radius:6px;background:var(--blueBg);border:1px solid var(--blueBdr);color:var(--blue);font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit;}
#chat-btn:hover{background:rgba(88,166,255,0.18);}
#chat-btn i{font-size:12px;}

#c-desc{font-size:12px;color:var(--t2);line-height:1.65;margin-top:4px;}

/* 카테고리 영역 */
#cats{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;min-height:0;}
#cats::-webkit-scrollbar{width:3px;}
#cats::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px;}

/* 기출(KICE) 카드 — 황금 */
.kice-card{background:var(--amberBg);border:1px solid var(--amberBdr);border-radius:8px;overflow:hidden;flex-shrink:0;}
.kice-head{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;user-select:none;}
.kice-head:hover{background:rgba(210,153,34,0.08);}
.kice-head .ch-icon{font-size:14px;color:var(--amber);}
.kice-head .ch-title{font-size:12px;font-weight:600;color:var(--amber);flex:1;}
.kice-head .ch-count{font-size:10px;color:rgba(210,153,34,0.6);}
.kice-head .ch-chev{font-size:11px;color:var(--amber);opacity:0.6;transition:transform 0.2s;}
.kice-head.open .ch-chev{transform:rotate(180deg);}
.kice-body{display:none;padding:8px 10px 10px;border-top:1px solid var(--amberBdr);display:flex;flex-direction:column;gap:6px;}
.kice-body.open{display:flex;}

.kice-item{background:var(--bg1);border:1px solid var(--bdr);border-radius:6px;padding:9px 10px;}
.kice-item-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.kice-item-text{font-size:12px;color:var(--t1);line-height:1.65;flex:1;}
.kice-badges{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.badge-bichul{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--redBg);border:1px solid rgba(248,81,73,0.25);color:var(--red);font-weight:600;white-space:nowrap;}
.badge-imp{font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;font-weight:600;}
.badge-imp.i3{background:rgba(210,153,34,0.15);border:1px solid rgba(210,153,34,0.3);color:var(--amber);}
.badge-imp.i2{background:rgba(88,166,255,0.1);border:1px solid rgba(88,166,255,0.2);color:var(--blue);}
.badge-imp.i1{background:var(--bg3);border:1px solid var(--bdr);color:var(--t3);}
.kice-tags{display:flex;flex-wrap:wrap;gap:4px;}
.kice-year-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(88,166,255,0.08);border:1px solid rgba(88,166,255,0.15);color:#7db8f7;}

/* EBS 카드 — 청록 */
.ebs-card{background:rgba(57,211,83,0.06);border:1px solid rgba(57,211,83,0.2);border-radius:8px;overflow:hidden;flex-shrink:0;}
.ebs-head{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;user-select:none;}
.ebs-head:hover{background:rgba(57,211,83,0.05);}
.ebs-head .ch-icon{font-size:14px;color:var(--teal);}
.ebs-head .ch-title{font-size:12px;font-weight:600;color:var(--teal);flex:1;}
.ebs-head .ch-count{font-size:10px;color:rgba(57,211,83,0.5);}
.ebs-head .ch-chev{font-size:11px;color:var(--teal);opacity:0.6;transition:transform 0.2s;}
.ebs-head.open .ch-chev{transform:rotate(180deg);}
.ebs-body{display:none;padding:8px 10px 10px;border-top:1px solid rgba(57,211,83,0.2);flex-direction:column;gap:6px;}
.ebs-body.open{display:flex;}

.ebs-item{background:var(--bg1);border:1px solid var(--bdr);border-radius:6px;padding:9px 10px;}
.ebs-item-label{font-size:10px;color:var(--teal);font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.ebs-item-label i{font-size:10px;}
.ebs-item-text{font-size:12px;color:var(--t1);line-height:1.65;}
.ebs-source-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(57,211,83,0.08);border:1px solid rgba(57,211,83,0.15);color:rgba(57,211,83,0.8);margin-top:6px;}

/* 대륙 카드 */
.continent-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:12px;flex-shrink:0;}
.continent-title{font-size:13px;font-weight:500;margin-bottom:8px;color:var(--t1);}
.continent-issues{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:12px;}
.top5-label{font-size:11px;color:var(--t3);margin-bottom:6px;font-weight:500;}
.top5-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--bdr);background:var(--bg1);margin-bottom:5px;}
.top5-item:hover{background:var(--bg3);border-color:var(--accent);}
.top5-rank{font-size:11px;color:var(--t3);width:16px;text-align:center;flex-shrink:0;}
.top5-flag{font-size:16px;}
.top5-name{font-size:12px;flex:1;}
.top5-count{font-size:11px;color:var(--amber);}

/* 준비중 */
.empty-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--t3);font-size:13px;text-align:center;}
.empty-panel i{font-size:28px;}

/* 하단바 */
#bbar{height:36px;background:var(--bg1);border-top:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;gap:16px;flex-shrink:0;font-size:11px;color:var(--t3);z-index:5;}
.bs{display:flex;align-items:center;gap:4px;}
.bv{color:var(--t2);font-weight:500;}
.bv.g{color:var(--accent2);}

/* 챗봇 모달 */
#chat-modal{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:none;align-items:center;justify-content:center;}
#chat-modal.open{display:flex;}
#chat-box{background:var(--bg1);border:1px solid var(--bdr);border-radius:12px;width:480px;height:560px;display:flex;flex-direction:column;overflow:hidden;}
#chat-header{padding:14px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;flex-shrink:0;}
#chat-header-flag{font-size:20px;}
#chat-header-info{flex:1;}
#chat-header-title{font-size:13px;font-weight:500;}
#chat-header-sub{font-size:11px;color:var(--t2);}
#chat-close{width:28px;height:28px;border-radius:6px;background:none;border:1px solid var(--bdr);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;}
#chat-close:hover{background:var(--bg3);}
#chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
#chat-messages::-webkit-scrollbar{width:3px;}
#chat-messages::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px;}
.msg{max-width:85%;font-size:12px;line-height:1.7;padding:8px 12px;border-radius:8px;}
.msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-radius:8px 8px 2px 8px;}
.msg.bot{align-self:flex-start;background:var(--bg2);color:var(--t1);border:1px solid var(--bdr);border-radius:8px 8px 8px 2px;}
.msg.bot.loading{color:var(--t3);}
#chat-input-area{padding:12px;border-top:1px solid var(--bdr);display:flex;gap:8px;flex-shrink:0;}
#chat-input{flex:1;background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;padding:8px 12px;color:var(--t1);font-size:12px;font-family:inherit;outline:none;resize:none;height:36px;line-height:1.5;}
#chat-input:focus{border-color:var(--blue);}
#chat-send{width:36px;height:36px;background:var(--blue);border:none;border-radius:6px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
#chat-send:hover{background:#79b8ff;}
#chat-send:disabled{background:var(--bg3);cursor:not-allowed;}
.chat-suggestions{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.chat-sugg{font-size:11px;padding:4px 9px;border-radius:20px;border:1px solid var(--bdr);background:var(--bg3);color:var(--t2);cursor:pointer;white-space:nowrap;}
.chat-sugg:hover{border-color:var(--blue);color:var(--blue);}
</style>
</head>
<body>
<div id="gt">
  <div id="nav">
    <div class="nlogo">Geo<br>Tap</div>
    <button class="nbtn on" id="nav-map" onclick="switchView('map')">
      <i class="ti ti-world"></i>
      <span class="nbtn-label">세계지도</span>
    </button>
    <button class="nbtn" id="nav-conflict" onclick="switchView('conflict')">
      <i class="ti ti-sword"></i>
      <span class="nbtn-label">분쟁지도 (준비 중)</span>
    </button>
    <div style="flex:1;"></div>
    <button class="nbtn"><i class="ti ti-settings"></i><span class="nbtn-label">설정</span></button>
  </div>

  <div id="main">
    <div id="topbar">
      <span id="tb-title">GeoTap</span>
      <span id="tb-sep">/</span>
      <span id="tb-sub">세계 지도 탐색</span>
      <div id="sbox">
        <i class="ti ti-search" style="font-size:13px;color:#484f58;"></i>
        <input placeholder="국가명, 키워드 검색..." id="sinput"/>
      </div>
    </div>

    <div id="map-view">
      <div id="map-area">
        <div id="toolbar">
          <button class="rpill on" data-region="all">전체</button>
          <button class="rpill" data-region="asia">아시아</button>
          <button class="rpill" data-region="europe">유럽</button>
          <button class="rpill" data-region="africa">아프리카</button>
          <button class="rpill" data-region="namerica">북미</button>
          <button class="rpill" data-region="samerica">남미</button>
          <button class="rpill" data-region="oceania">오세아니아</button>
        </div>
        <button id="reset-btn"><i class="ti ti-zoom-out" style="font-size:12px;"></i> 전체 보기</button>
        <svg id="world-svg" viewBox="0 0 960 500"><g id="map-g"></g><g id="marker-g"></g></svg>
        <div id="zoom-controls">
          <button class="zbtn" id="zi"><i class="ti ti-plus" style="font-size:14px;"></i></button>
          <button class="zbtn" id="zo"><i class="ti ti-minus" style="font-size:14px;"></i></button>
        </div>
        <div id="legend">
          <span class="ldot" style="background:#1d4a2a;"></span>데이터 있음
          <span class="ldot" style="background:#1a3a5c;"></span>준비 중
          <span class="ldot" style="background:#3fb950;"></span>선택됨
        </div>

        <!-- 사이드 패널 -->
        <div id="panel">
          <div id="ph">
            <div id="ph-top">
              <div id="ph-left">
                <span id="c-flag"></span>
                <div><div id="c-name"></div><div id="c-en"></div></div>
              </div>
              <div id="ph-actions">
                <button id="chat-btn" onclick="openChat()">
                  <i class="ti ti-message-circle"></i> AI에게 물어보기
                </button>
                <button id="close-btn" aria-label="닫기"><i class="ti ti-x"></i></button>
              </div>
            </div>
            <div id="c-desc"></div>
          </div>
          <div id="cats"></div>
        </div>
      </div>
    </div>

    <div id="conflict-view">
      <i class="ti ti-sword" style="font-size:48px;color:var(--t3);"></i>
      <div style="font-size:16px;font-weight:500;color:var(--t2);">분쟁지도</div>
      <div style="font-size:13px;color:var(--t3);text-align:center;line-height:1.7;">전 세계 분쟁을 한눈에 볼 수 있는<br>분쟁지도를 준비 중이에요.</div>
    </div>

    <div id="bbar">
      <span class="bs"><i class="ti ti-world" style="font-size:12px;"></i>&nbsp;전체 <span class="bv">195개국</span></span>
      <span class="bs">데이터 보유 <span class="bv g" id="data-count">로딩 중...</span></span>
      <span class="bs" style="margin-left:auto;">수능 세계지리 · 평가원 기출 기반</span>
    </div>
  </div>
</div>

<!-- 챗봇 모달 -->
<div id="chat-modal">
  <div id="chat-box">
    <div id="chat-header">
      <span id="chat-header-flag">🌍</span>
      <div id="chat-header-info">
        <div id="chat-header-title">AI 지리 도우미</div>
        <div id="chat-header-sub">기본 정보, 기후, 지형 등 무엇이든 물어보세요</div>
      </div>
      <button id="chat-close" onclick="closeChat()"><i class="ti ti-x"></i></button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <textarea id="chat-input" placeholder="질문을 입력하세요..." rows="1"></textarea>
      <button id="chat-send" onclick="sendChat()"><i class="ti ti-send"></i></button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
// ── 뷰 전환 ──────────────────────────────────────
function switchView(v){
  document.getElementById('map-view').style.display=v==='map'?'flex':'none';
  document.getElementById('conflict-view').style.display=v==='conflict'?'flex':'none';
  document.getElementById('nav-map').classList.toggle('on',v==='map');
  document.getElementById('nav-conflict').classList.toggle('on',v==='conflict');
  document.getElementById('tb-sub').textContent=v==='map'?'세계 지도 탐색':'분쟁지도';
}

  });
  cats.appendChild(card);
  document.getElementById('panel').classList.add('open');
}

function zoomToFeature(feature){
  const mapArea=document.getElementById('map-area');
  const W=mapArea.clientWidth,H=mapArea.clientHeight;
  const panelOpen=document.getElementById('panel').classList.contains('open');
  const effectiveW=panelOpen?W-320:W;
  const bounds=pathFn.bounds(feature);
  const bW=bounds[1][0]-bounds[0][0],bH=bounds[1][1]-bounds[0][1];
  const bCX=(bounds[0][0]+bounds[1][0])/2,bCY=(bounds[0][1]+bounds[1][1])/2;
  const scale=Math.min(8,0.82/Math.max(bW/effectiveW,bH/H));
  const tx=effectiveW/2-scale*bCX,ty=H/2-scale*bCY;
  svgEl.transition().duration(750).call(zoomBehavior.transform,d3.zoomIdentity.translate(tx,ty).scale(scale));
}

function zoomToRegion(region){
  const r=REGION_BOUNDS[region];if(!r)return;
  const mapArea=document.getElementById('map-area');
  const W=mapArea.clientWidth,H=mapArea.clientHeight;
  const effectiveW=W-320; // 패널 320px 제외한 유효 너비
  const center=proj([r.center[0],r.center[1]]);
  const scale=r.scale/153;
  const tx=effectiveW/2-scale*center[0],ty=H/2-scale*center[1];
  svgEl.transition().duration(750).call(zoomBehavior.transform,d3.zoomIdentity.translate(tx,ty).scale(scale));
}

function resetZoom(){
  svgEl.transition().duration(600).call(zoomBehavior.transform,d3.zoomIdentity);
  document.getElementById('reset-btn').style.display='none';
  document.getElementById('panel').classList.remove('open');
  if(selEl){d3.select(selEl).classed('sel',false);selEl=null;}
}

async function sendChat(){
  const input=document.getElementById('chat-input');
  const q=input.value.trim();
  if(!q)return;
  input.value='';

  const msgs=document.getElementById('chat-messages');

  // 사용자 메시지
  const userMsg=document.createElement('div');
  userMsg.className='msg user';
  userMsg.textContent=q;
  msgs.appendChild(userMsg);

  // 로딩
  const loadMsg=document.createElement('div');
  loadMsg.className='msg bot loading';
  loadMsg.textContent='답변 생성 중...';
  msgs.appendChild(loadMsg);
  msgs.scrollTop=msgs.scrollHeight;

  document.getElementById('chat-send').disabled=true;

  chatHistory.push({role:'user',content:q});

  try{
    const systemPrompt=`너는 수능 세계지리 전문 AI 도우미야. 지금 학생이 "${chatCountry?.kr||''} (${chatCountry?.en||''})"에 대해 질문하고 있어.

역할:
- 이 나라의 기후, 지형, 종교, 언어, 인구, 도시화, 역사, 문화 등 기본 지리 정보를 수능 수험생 수준에 맞게 명확하게 설명해줘
- 수능에서 자주 출제되는 개념은 강조해줘
- 답변은 간결하고 명확하게, 3~5문장 내외로
- 한국어로 답변해줘`;

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:systemPrompt,
        messages:chatHistory
      })
    });

    const data=await res.json();
    const answer=data.content?.[0]?.text||'답변을 가져오지 못했어요.';

    chatHistory.push({role:'assistant',content:answer});

    loadMsg.classList.remove('loading');
    loadMsg.textContent=answer;
  }catch(e){
    loadMsg.classList.remove('loading');
    loadMsg.textContent='오류가 발생했어요. 다시 시도해주세요.';
    chatHistory.pop();
  }finally{
    document.getElementById('chat-send').disabled=false;
    msgs.scrollTop=msgs.scrollHeight;
  }
}

document.getElementById('chat-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}
});
document.getElementById('chat-modal').addEventListener('click',function(e){
  if(e.target===this)closeChat();
});

  markerG=d3.select('#marker-g');
  proj=d3.geoNaturalEarth1().scale(153).translate([480,265]);
  pathFn=d3.geoPath().projection(proj);
  const feats=topojson.feature(world,world.objects.countries).features;

  zoomBehavior=d3.zoom().scaleExtent([1,12]).on('zoom',e=>{
    gEl.attr('transform',e.transform);
    gEl.selectAll('.cp').attr('stroke-width',0.5/e.transform.k);
  });
  svgEl.call(zoomBehavior);

  document.getElementById('zi').addEventListener('click',()=>svgEl.transition().duration(300).call(zoomBehavior.scaleBy,1.5));
  document.getElementById('zo').addEventListener('click',()=>svgEl.transition().duration(300).call(zoomBehavior.scaleBy,0.67));

  gEl.selectAll('path').data(feats).join('path')
    .attr('class',d=>'cp'+(IDS[String(d.id).padStart(3,'0')]?' hd':''))
    .attr('d',pathFn)
    .on('click',function(e,d){
      e.stopPropagation();
      if(selEl)d3.select(selEl).classed('sel',false);
      selEl=this;d3.select(this).classed('sel',true);
      document.querySelectorAll('.rpill').forEach(b=>b.classList.remove('on'));
      document.querySelector(".rpill[data-region='all']").classList.add('on');
      const name=IDS[String(d.id).padStart(3,'0')]||null;
      renderPanel(name||null);
      document.getElementById('reset-btn').style.display='flex';
      setTimeout(()=>zoomToFeature(d),50);
    });

  svgEl.on('click',()=>resetZoom());
}

init();
</script>
</body>
</html>
